name: 'Build OTel Lambda Layer'
description: 'Dispatches to the matching build-<language>-layer composite action.'

inputs:
  language:
    description: 'Language of the layer to build (nodejs, python, ruby, javaagent, javawrapper)'
    required: true
  architecture:
    description: 'Target architecture (amd64 or arm64). Only used for ruby.'
    required: false
    default: amd64

outputs:
  artifact-path:
    description: 'Absolute path to the built layer zip'
    value: ${{ steps.nodejs.outputs.artifact-path || steps.python.outputs.artifact-path || steps.ruby.outputs.artifact-path || (inputs.language == 'javaagent' && steps.java.outputs.javaagent-artifact-path || steps.java.outputs.javawrapper-artifact-path) }}
  component-version:
    description: 'SDK version included in the layer'
    value: ${{ steps.nodejs.outputs.component-version || steps.python.outputs.component-version || steps.ruby.outputs.component-version || (inputs.language == 'javaagent' && steps.java.outputs.javaagent-version || steps.java.outputs.javawrapper-version) }}

runs:
  using: composite
  steps:
    - if: ${{ inputs.language == 'nodejs' }}
      id: nodejs
      uses: ./.github/actions/build-nodejs-layer

    - if: ${{ inputs.language == 'python' }}
      id: python
      uses: ./.github/actions/build-python-layer

    - if: ${{ inputs.language == 'ruby' }}
      id: ruby
      uses: ./.github/actions/build-ruby-layer
      with:
        architecture: ${{ inputs.architecture }}

    - if: ${{ inputs.language == 'javaagent' || inputs.language == 'javawrapper' }}
      id: java
      uses: ./.github/actions/build-java-layer
