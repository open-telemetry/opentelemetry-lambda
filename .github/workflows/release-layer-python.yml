name: "Release Python Lambda Layer"

on:
  # (Using tag push instead of release to allow filtering by tag prefix.)
  push:
    tags:
      - layer-python/**

permissions:
  contents: read

jobs:
  build-layer:
    runs-on: ubuntu-latest
    outputs:
      component-version: ${{ steps.build.outputs.component-version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./.github/actions/build-python-layer
        id: build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        name: Save assembled layer to build
        with:
          name: opentelemetry-python-layer.zip
          path: ${{ steps.build.outputs.artifact-path }}

  integration-test:
    permissions:
      contents: read
      id-token: write
    needs: build-layer
    uses: ./.github/workflows/integration-test.yml
    with:
      language: python
      use-existing-layer-artifact: true
    secrets: inherit

  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [build-layer, integration-test]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Create Release
        run: gh release create ${{ github.ref_name }} --draft --title ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: opentelemetry-python-layer.zip

      - name: Add Binary to Release
        run: gh release upload ${{ github.ref_name }} opentelemetry-python-layer.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-layer:
    permissions: # required by the reusable workflow
      contents: read
      id-token: write
    uses: ./.github/workflows/layer-publish.yml
    needs: [build-layer, create-release]
    strategy:
      matrix:
        aws_region: 
          - af-south-1
          - ap-east-1
          - ap-east-2
          - ap-northeast-1
          - ap-northeast-2
          - ap-northeast-3
          - ap-south-1
          - ap-south-2
          - ap-southeast-1
          - ap-southeast-2
          - ap-southeast-3
          - ap-southeast-4
          - ap-southeast-5
          - ap-southeast-6
          - ap-southeast-7
          - ca-central-1
          - ca-west-1
          - eu-central-1
          - eu-central-2
          - eu-north-1
          - eu-south-1
          - eu-south-2
          - eu-west-1
          - eu-west-2
          - eu-west-3
          - il-central-1
          - me-central-1
          - me-south-1
          - mx-central-1
          - sa-east-1
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
    with:
      artifact-name: opentelemetry-python-layer.zip
      layer-name: opentelemetry-python
      component-version: ${{ needs.build-layer.outputs.component-version }}
      release-group: prod
      aws_region: ${{ matrix.aws_region }}
    secrets: inherit
