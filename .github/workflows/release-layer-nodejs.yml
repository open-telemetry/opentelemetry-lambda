name: "Release NodeJS Lambda Layer"

on:
  # (Using tag push instead of release to allow filtering by tag prefix.)
  push:
    tags:
      - layer-nodejs/**

permissions:
  contents: read

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Create Release
        run: gh release create ${{ github.ref_name }} --draft --title ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-layer:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: create-release
    outputs:
      component-version: ${{ steps.build.outputs.component-version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/build-nodejs-layer
        id: build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        name: Save assembled layer to build
        with:
          name: opentelemetry-nodejs-layer.zip
          path: ${{ steps.build.outputs.artifact-path }}

      - name: Add Binary to Release
        run: gh release upload ${{ github.ref_name }} ${{ steps.build.outputs.artifact-path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration-test:
    permissions:
      contents: read
      id-token: write
    needs: build-layer
    uses: ./.github/workflows/integration-test.yml
    with:
      language: nodejs
      use-existing-layer-artifact: true
    secrets: inherit

  publish-layer:
    permissions: # required by the reusable workflow
      contents: read
      id-token: write
    uses: ./.github/workflows/layer-publish.yml
    needs: [build-layer, integration-test]
    strategy:
      matrix:
        aws_region:
          - af-south-1
          - ap-east-1
          - ap-east-2
          - ap-northeast-1
          - ap-northeast-2
          - ap-northeast-3
          - ap-south-1
          - ap-south-2
          - ap-southeast-1
          - ap-southeast-2
          - ap-southeast-3
          - ap-southeast-4
          - ap-southeast-5
          - ap-southeast-6
          - ap-southeast-7
          - ca-central-1
          - ca-west-1
          - eu-central-1
          - eu-central-2
          - eu-north-1
          - eu-south-1
          - eu-south-2
          - eu-west-1
          - eu-west-2
          - eu-west-3
          - il-central-1
          - me-central-1
          - me-south-1
          - mx-central-1
          - sa-east-1
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
    with:
      artifact-name: opentelemetry-nodejs-layer.zip
      layer-name: opentelemetry-nodejs
      component-version: ${{ needs.build-layer.outputs.component-version }}
      # architecture:
      # If you add a nodejs runtime here, please make sure that the collector/Makefile publish and publish-layer targets
      # get updated as well
      runtimes: nodejs20.x nodejs22.x nodejs24.x
      release-group: prod
      aws_region: ${{ matrix.aws_region }}
    secrets: inherit
