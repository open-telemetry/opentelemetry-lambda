name: "Release Javaagent Lambda Layer"

on:
  # (Using tag push instead of release to allow filtering by tag prefix.)
  push:
    tags:
      - layer-javaagent/**

permissions:
  contents: read

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create Release
        run: gh release create ${{ github.ref_name }} --draft --title ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-layer:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: create-release
    outputs:
      JAVAAGENT_VERSION: ${{ steps.build.outputs.javaagent-version }}
      JAVAWRAPPER_VERSION: ${{ steps.build.outputs.javawrapper-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/build-java-layer
        id: build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        name: Save javaagent layer to build
        with:
          name: opentelemetry-javaagent-layer.zip
          path: ${{ steps.build.outputs.javaagent-artifact-path }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        name: Save javawrapper layer to build
        with:
          name: opentelemetry-javawrapper-layer.zip
          path: ${{ steps.build.outputs.javawrapper-artifact-path }}

      - name: Add Binary to Release
        run: |
          gh release upload ${{github.ref_name}} ${{ steps.build.outputs.javawrapper-artifact-path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration-test:
    permissions:
      contents: read
      id-token: write
    needs: build-layer
    strategy:
      matrix:
        flavor: [javaagent, javawrapper]
    uses: ./.github/workflows/integration-test.yml
    with:
      language: ${{ matrix.flavor }}
      use-existing-layer-artifact: true
    secrets: inherit

  publish-javaagent-layer:
    permissions: # required by the reusable workflow
      contents: read
      id-token: write
    uses: ./.github/workflows/layer-publish.yml
    needs: [build-layer, integration-test]
    strategy:
      matrix:
        aws_region: 
          - af-south-1
          - ap-east-1
          - ap-east-2
          - ap-northeast-1
          - ap-northeast-2
          - ap-northeast-3
          - ap-south-1
          - ap-south-2
          - ap-southeast-1
          - ap-southeast-2
          - ap-southeast-3
          - ap-southeast-4
          - ap-southeast-5
          - ap-southeast-6
          - ap-southeast-7
          - ca-central-1
          - ca-west-1
          - eu-central-1
          - eu-central-2
          - eu-north-1
          - eu-south-1
          - eu-south-2
          - eu-west-1
          - eu-west-2
          - eu-west-3
          - il-central-1
          - me-central-1
          - me-south-1
          - mx-central-1
          - sa-east-1
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
    with:
      artifact-name: opentelemetry-javaagent-layer.zip
      layer-name: opentelemetry-javaagent
      component-version: ${{needs.build-layer.outputs.JAVAAGENT_VERSION}}
      # architecture:
      # If you add a java runtime here, please make sure that the collector/Makefile publish and publish-layer targets
      # get updated as well
      runtimes: java8.al2 java11 java17 java21
      release-group: prod
      aws_region: ${{ matrix.aws_region }}
    secrets: inherit

  publish-javawrapper-layer:
    permissions: # required by the reusable workflow
      contents: read
      id-token: write
    uses: ./.github/workflows/layer-publish.yml
    needs: [build-layer, integration-test]
    strategy:
      matrix:
        aws_region:
          - af-south-1
          - ap-east-1
          - ap-east-2
          - ap-northeast-1
          - ap-northeast-2
          - ap-northeast-3
          - ap-south-1
          - ap-south-2
          - ap-southeast-1
          - ap-southeast-2
          - ap-southeast-3
          - ap-southeast-4
          - ap-southeast-5
          - ap-southeast-6
          - ap-southeast-7
          - ca-central-1
          - ca-west-1
          - eu-central-1
          - eu-central-2
          - eu-north-1
          - eu-south-1
          - eu-south-2
          - eu-west-1
          - eu-west-2
          - eu-west-3
          - il-central-1
          - me-central-1
          - me-south-1
          - mx-central-1
          - sa-east-1
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
    with:
      artifact-name: opentelemetry-javawrapper-layer.zip
      layer-name: opentelemetry-javawrapper
      component-version: ${{needs.build-layer.outputs.JAVAWRAPPER_VERSION}}
      # architecture:
      runtimes: java8.al2 java11 java17
      release-group: prod
      aws_region: ${{ matrix.aws_region }}
    secrets: inherit

