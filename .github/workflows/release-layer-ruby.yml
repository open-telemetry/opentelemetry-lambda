name: "Release Ruby Lambda Layer"

on:
  # (Using tag push instead of release to allow filtering by tag prefix.)
  push:
    tags:
      - layer-ruby/**

permissions:
  contents: read

jobs:
  build-layer:
    runs-on: ${{ matrix.architecture == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        architecture:
          - amd64
          - arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/build-ruby-layer
        id: build
        with:
          architecture: ${{ matrix.architecture }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        name: Save assembled layer to build
        with:
          name: opentelemetry-ruby-layer-${{ matrix.architecture }}.zip
          path: ${{ steps.build.outputs.artifact-path }}

      - name: Save component version to file (amd64 only)
        if: ${{ matrix.architecture == 'amd64' }}
        shell: bash
        run: echo "${{ steps.build.outputs.component-version }}" > component-version.txt

      - name: Upload component version artifact (amd64 only)
        if: ${{ matrix.architecture == 'amd64' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruby-component-version
          path: component-version.txt

  get-version:
    runs-on: ubuntu-latest
    needs: [build-layer]
    outputs:
      component-version: ${{ steps.read-version.outputs.version }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ruby-component-version

      - id: read-version
        shell: bash
        run: echo "version=$(cat component-version.txt)" >> "$GITHUB_OUTPUT"

  integration-test:
    permissions:
      contents: read
      id-token: write
    needs: build-layer
    uses: ./.github/workflows/integration-test.yml
    with:
      language: ruby
      use-existing-layer-artifact: true
    secrets: inherit

  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [build-layer, integration-test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create Release
        run: gh release create ${{ github.ref_name }} --draft --title ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: opentelemetry-ruby-layer-amd64.zip

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: opentelemetry-ruby-layer-arm64.zip

      - name: Add Binaries to Release
        run: |
          gh release upload ${{ github.ref_name }} opentelemetry-ruby-layer-amd64.zip
          gh release upload ${{ github.ref_name }} opentelemetry-ruby-layer-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-layer:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/layer-publish.yml
    needs: [build-layer, create-release, get-version]
    strategy:
      matrix:
        architecture:
          - amd64
          - arm64
        aws_region:
          - af-south-1
          - ap-east-1
          - ap-east-2
          - ap-northeast-1
          - ap-northeast-2
          - ap-northeast-3
          - ap-south-1
          - ap-south-2
          - ap-southeast-1
          - ap-southeast-2
          - ap-southeast-3
          - ap-southeast-4
          - ap-southeast-5
          - ap-southeast-6
          - ap-southeast-7
          - ca-central-1
          - ca-west-1
          - eu-central-1
          - eu-central-2
          - eu-north-1
          - eu-south-1
          - eu-south-2
          - eu-west-1
          - eu-west-2
          - eu-west-3
          - il-central-1
          - me-central-1
          - me-south-1
          - mx-central-1
          - sa-east-1
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
    with:
      artifact-name: opentelemetry-ruby-layer-${{ matrix.architecture }}.zip
      layer-name: opentelemetry-ruby
      component-version: ${{ needs.get-version.outputs.component-version }}
      architecture: ${{ matrix.architecture }}
      runtimes: ruby3.3 ruby3.4
      release-group: prod
      aws_region: ${{ matrix.aws_region }}
    secrets: inherit
